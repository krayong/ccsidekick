# PR auto-labels (actions/labeler v5). Keyed by changed-file globs. A file may match several labels.
# NOTE: adding a new pack needs a new `<name> pack` entry here (packs can't be globbed to distinct labels).

"core":
  - changed-files:
      - any-glob-to-any-file: "packages/core/**"

"website":
  - changed-files:
      - any-glob-to-any-file:
          - "website/**"
          - "scripts/website/**" # site tooling is website work too (also gets ci/cd)

"ci/cd":
  - changed-files:
      - any-glob-to-any-file:
          - "scripts/**"
          - ".github/**"

"agents":
  - changed-files:
      - any-glob-to-any-file:
          - ".claude/**"
          - "**/CLAUDE.md"
          - "**/AGENTS.md"

