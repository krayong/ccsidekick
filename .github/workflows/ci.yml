name: CI

on:
  push: { branches: [main] }
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: typecheck, lint, format

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: ./.github/actions/setup

      - run: bun run typecheck

      - run: bun run lint

      - run: bun run format:check

      - run: bun run readme:drift # README badge/prose counts must match the code

      - run: bun run site:build # smoke the site generators (data.js, render-web.js, media copy)

      - run: bun run site:drift # website data must match the packs/themes/widgets

  changeset:
    name: changeset

    # Only meaningful on a PR (a push to main has already consumed its changesets via the release flow).
    if: github.event_name == 'pull_request'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # full history so `changeset status` can diff this branch against the base

      - uses: ./.github/actions/setup

      # Any change under a published package (packages/core or packages/packs/*) must carry a changeset.
      # For a change that should not release (docs, a comment, tooling that happens to sit in a package),
      # add an empty changeset: `bun run changeset -- --empty`.
      - name: changeset present for package changes
        env:
          BASE_REF: ${{ github.base_ref }} # PR target branch; via env so it never lands in the shell command
        run: |
          git fetch origin "$BASE_REF" # ensure origin/<base> is present for --since
          bunx changeset status --since="origin/$BASE_REF"

  test:
    name: test

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: ./.github/actions/setup

      - run: bun run test # includes the .claude pack-author scripts (a dot-dir a bare `bun test` skips)

      - name: pack:lint every pack (full content gate)
        run: |
          for d in packages/packs/*/; do
            echo "== pack:lint $d =="
            bun run pack:lint "$d"
          done

  build:
    name: build, bundle smoke, secret scan

    needs: [check, test]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with: { fetch-depth: 0 } # full history so trufflehog can diff-scan the push

      - uses: ./.github/actions/setup

      - run: bun run build # emits the two ESM bundles into packages/core/dist

      - name: package publishability (publint)
        run: |
          set -euo pipefail

          for dir in packages/core packages/packs/*/; do
            echo "== publint $dir =="
            bunx publint "$dir"
          done

      # Informational until a package ships type definitions: the engine is CLI-only and packs are pure data, so
      # there are no `.d.ts` to resolve today — this guards the exports/types resolution once that changes.
      - name: type-resolution check (are-the-types-wrong)
        continue-on-error: true
        run: |
          for dir in packages/core packages/packs/*/; do
            echo "== attw $dir =="
            bunx --bun @arethetypeswrong/cli --pack "$dir" || true
          done

      - name: bundle smoke (render bundle under plain node)
        run: |
          cfg="$(mktemp -d)"
          mkdir -p "$cfg/ccsidekick"
          printf 'schema_version = 1\n\n[network]\nfx_refresh = false\nusage_fetch = false\n' > "$cfg/ccsidekick/config.toml"
          out="$(CLAUDE_CONFIG_DIR="$cfg" node packages/core/dist/ccsidekick-render.js render < packages/core/test/fixtures/payloads/canonical.json)"
          test -n "$out" || { echo "render bundle produced no output"; exit 1; }
          printf '%s\n' "$out"

      - name: trufflehog secret scan (authoritative gate)
        uses: trufflesecurity/trufflehog@30d5bb91af1a771378349dbbb0c82129392acf70 # v3.95.6
        # The action injects --fail itself; the trufflehog CLI (pinned to latest) now rejects a repeated --fail,
        # so keep only --only-verified here to avoid `flag 'fail' cannot be repeated`.
        with: { extra_args: --only-verified }
