name: Deploy Website

# Build the landing site and publish it to the Cloudflare Worker (static assets). Triggers when the
# Release workflow dispatches it after a `ccsidekick` core publish, and on manual `workflow_dispatch` for
# urgent site-only fixes — a tag pushed with GITHUB_TOKEN can't trigger this workflow, so Release
# dispatches it instead. The concurrency group below collapses overlapping deploys — each newly-queued run
# cancels the in-progress one, so only the last completes. Secrets live in the `prod` GitHub environment
# (CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID); the job must declare `environment: prod` to read them.

on:
  workflow_dispatch: # Release dispatches this after a core publish; also manual for urgent site-only fixes

concurrency:
  group: deploy-site
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment: prod

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: ./.github/actions/setup

      - run: bun run site:build # generates website/ (data.js, render-web.js, tokens.css, copied media)

      # DESIGN.md (and any other in-repo .md) is a source doc, not part of the served site. site:build has
      # already consumed it (tokens.css), so strip .md from the upload dir before deploying.
      - run: find website -type f -name '*.md' -delete

      - run: find website -type f -name '*.template.*' -delete # never serve raw {{tokens}}

      - name: Hash the deployable site
        id: sitehash
        run: |
          H="$(find website -type f -exec sha256sum {} + | sort | sha256sum | cut -d' ' -f1)"
          echo "hash=$H" >> "$GITHUB_OUTPUT"

      - name: Check whether this exact output already shipped
        id: shipped
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.4
        with:
          path: .deployed-site-hash
          key: deployed-site-${{ steps.sitehash.outputs.hash }}

      - name: Deploy to Cloudflare Pages
        if: steps.shipped.outputs.cache-hit != 'true'
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.110.0"
          # Reads wrangler.jsonc: deploys the static-assets Worker and reconciles the ccsidekick.krayong.com custom domain.
          command: deploy

      - name: Record + save the shipped-hash marker
        if: steps.shipped.outputs.cache-hit != 'true'
        run: echo "${{ steps.sitehash.outputs.hash }}" > .deployed-site-hash
      - if: steps.shipped.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.4
        with:
          path: .deployed-site-hash
          key: deployed-site-${{ steps.sitehash.outputs.hash }}
