name: Labeler

# Apply path-based labels to a PR from .github/labeler.yml, ensuring each label exists (coloured) first.
# pull_request (not pull_request_target) so the bot-authored "Version Packages" release PR still runs this
# job and reports the required `label` check — pull_request_target never fires for github-actions[bot] PRs.
# A fork PR (read-only token under pull_request) is skipped by the job guard below, so it is not labeled.
on:
  pull_request:

concurrency:
  group: labeler-${{ github.event.pull_request.number }}
  # Serialize per PR but don't cancel: a cancelled run reports a `failure` conclusion, which would fail the
  # required `label` check. Letting a superseded run finish keeps the check green (and avoids racing sync-labels).
  cancel-in-progress: false

permissions:
  contents: read # checkout the base config + read pack themes
  issues: write # create/update the repo's labels
  pull-requests: write # add labels to the PR

jobs:
  label:
    # Same-repo PRs only. A fork PR gets a read-only token under pull_request, so labeling would fail; skipping
    # the job instead reports the required `label` check as passing, so a fork PR is neither labeled nor blocked.
    if: github.event.pull_request.head.repo.full_name == github.repository

    runs-on: ubuntu-latest

    steps:
      # persist-credentials off so gh authenticates via GH_TOKEN (the sync-labels script), not a stored git cred.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      # Create any missing label (pack labels coloured from the pack's theme, categories fixed) or resync colours.
      - name: ensure labels exist with theme colours
        env:
          GH_TOKEN: ${{ github.token }}
        run: bun run scripts/sync-labels.ts

      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5.0.0
