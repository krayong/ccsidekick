name: Feature Request

description: Suggest an idea or improvement

labels: ["enhancement"]

body:
  - type: checkboxes
    id: area
    attributes:
      label: Area
      description: What would this touch?
      options:
        - Statusline Widget
        - Character / Voice Behavior
        - New Character Pack
        - Cost / Usage / Analytics
        - TUI / Config
        - Others
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what gets in the way?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like ccsidekick to do?
    validations:
      required: false
