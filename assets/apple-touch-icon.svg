<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
	<!-- Full-bleed variant of favicon.svg for iOS: no rounded corners (iOS masks its own), so there is no
	     square-vs-rounded seam. Rasterize to assets/apple-touch-icon.png at 180x180 (rsvg-convert -w 180 -h 180). -->
	<defs>
		<linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0" stop-color="#5fafff" />
			<stop offset=".38" stop-color="#64d760" />
			<stop offset=".7" stop-color="#ffd687" />
			<stop offset="1" stop-color="#ff8c87" />
		</linearGradient>
	</defs>
	<rect width="32" height="32" fill="#0d1117" />
	<path d="M9 11.5l5 4.5-5 4.5" fill="none" stroke="url(#g)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" />
	<rect x="16.5" y="19" width="8" height="2.6" rx="1.3" fill="url(#g)" />
</svg>
